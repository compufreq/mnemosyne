# cargo-audit configuration.
#
# RUSTSEC-2024-0437 (protobuf < 3.7.2, uncontrolled-recursion crash on
# DECODING untrusted protobuf) is ignored: `protobuf` 2.x enters the tree
# only through `opentelemetry-prometheus` / `prometheus` in the OPTIONAL
# `telemetry` feature, and only to ENCODE our own metrics for the
# Prometheus/OTLP exposition — Mnemosyne never decodes untrusted protobuf,
# so the crash vector does not apply. Absent entirely from default builds.
# Revisit when opentelemetry-prometheus moves off protobuf 2.x.
[advisories]
ignore = ["RUSTSEC-2024-0437"]
