# Alertmanager routing for the Mnemosyne stack.
#
# All alerts route to the in-stack `alert-sink` webhook (a tiny receiver that
# logs delivered alerts to stdout) so you can see the whole path — rule fires
# in Prometheus, routes here, gets delivered — without any external creds.
# Swap in Slack/email/PagerDuty by uncommenting a receiver below and pointing
# the route at it.

global:
  resolve_timeout: 5m

route:
  receiver: alert-sink
  group_by: ["alertname", "surface", "vault"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  routes:
    # Tamper / integrity alerts page immediately (no group_wait).
    - matchers:
        - severity = "critical"
      receiver: alert-sink
      group_wait: 0s
      continue: true

receivers:
  - name: alert-sink
    webhook_configs:
      - url: http://alert-sink:9094/alert
        send_resolved: true

  # --- swap-ins (uncomment + fill, then point the route at them) ---
  # - name: slack
  #   slack_configs:
  #     - api_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
  #       channel: "#mnemosyne-alerts"
  #       title: "{{ .CommonAnnotations.summary }}"
  #       text: "{{ .CommonAnnotations.description }}"
  # - name: email
  #   email_configs:
  #     - to: "oncall@example.com"
  #       from: "mnemosyne@example.com"
  #       smarthost: "smtp.example.com:587"

inhibit_rules:
  # A critical tamper alert on a vault silences noisier warnings for it.
  - source_matchers: [severity = "critical"]
    target_matchers: [severity = "warning"]
    equal: ["vault"]
