# Minimal Tempo (local storage) — receives OTLP spans from mnemosyne.
# Mnemosyne exports OTLP/HTTP to http://tempo:4318 (MNEMOSYNE_OTLP_ENDPOINT).

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

usage_report:
  reporting_enabled: false
