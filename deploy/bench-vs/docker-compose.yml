# Shared local-model backend for the head-to-head competitor stacks.
# See README.md — competitor servers themselves are launched from their
# own published compose/self-host paths and pinned by digest at run
# time, so this file stays minimal and stable.
services:
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - bench-vs-ollama:/root/.ollama

  # mem0's local server (OpenMemory) + its qdrant. The service name
  # `mem0_store` is what the server expects to resolve. LLM/embedder are
  # configured post-start via the server's own config API to point at the
  # local OpenAI-compatible backend (LM Studio on the host by default) —
  # see README.md; the exact config used for a published row is recorded
  # with that row.
  mem0_store:
    image: qdrant/qdrant:latest
    volumes:
      - bench-vs-qdrant:/qdrant/storage

  # OpenMemory's mem0 `lmstudio` provider is hardwired to
  # localhost:1234; this bridge owns the network namespace the server
  # shares, forwarding in-container localhost:1234 to the host's LM
  # Studio. It additionally translates one API-dialect mismatch
  # (`response_format: json_object`, which LM Studio rejects) — see
  # lmstudio-shim.js; content is never touched, mem0's code unchanged.
  lmstudio-bridge:
    image: node:22-alpine
    command: ["node", "/shim/lmstudio-shim.js"]
    environment:
      # OpenMemory's hardcoded qdrant dims; nomic emits 768 — see shim.
      - PAD_EMBED_TO=1536
      - SHIM_DEBUG=1
    volumes:
      - ./lmstudio-shim.js:/shim/lmstudio-shim.js:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8765:8765"
      - "127.0.0.1:18800:8000"

  # mem0's canonical REST server (true semantic /search + full
  # /configure), built from their repo: docker build
  # https://github.com/mem0ai/mem0.git#main:server — image digest
  # recorded with any published row. Shares the bridge namespace like
  # OpenMemory, so localhost:1234 = host LM Studio through the shim.
  mem0-server:
    image: bench-mem0-server
    network_mode: "service:lmstudio-bridge"
    depends_on:
      - mem0_store
      - lmstudio-bridge
    environment:
      - OPENAI_API_KEY=lm-studio
      - OPENAI_BASE_URL=http://localhost:1234/v1

  openmemory-mcp:
    image: mem0/openmemory-mcp:latest
    network_mode: "service:lmstudio-bridge"
    depends_on:
      - mem0_store
      - lmstudio-bridge
    environment:
      - OPENAI_API_KEY=lm-studio
      # In-container localhost:1234 = the bridge/shim = host LM Studio;
      # the OpenAI client library reads this env for every openai-provider
      # call (the config API's base-url field is not persisted by this
      # build, so the env is the reliable channel).
      - OPENAI_BASE_URL=http://localhost:1234/v1
      - USER=bench

volumes:
  bench-vs-ollama:
  bench-vs-qdrant:
