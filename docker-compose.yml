# Mnemosyne test + run harness. Everything executes inside containers.
#
#   docker compose run --rm test          # unit + integration tests (cargo)
#   docker compose run --rm e2e           # end-to-end UI/UX suite against the real binary
#   docker compose run --rm backends-e2e  # remote index suite (starts qdrant/chroma/pgvector)
#   docker compose run --rm onnx-build    # compile check for the ONNX embedder feature
#   docker compose run --rm cli --help    # any CLI command
#   docker compose run --rm -i mcp        # MCP stdio server

services:
  test:
    build:
      context: .
      target: test
    command: ["cargo", "test", "--release"]

  e2e:
    build:
      context: .
      target: builder
    entrypoint: ["bash", "/src/tests/e2e.sh"]
    volumes:
      - ./tests/e2e.sh:/src/tests/e2e.sh:ro

  backends-e2e:
    build:
      context: .
      target: builder
    entrypoint: ["bash", "/src/tests/e2e-backends.sh"]
    environment:
      MNEMOSYNE_QDRANT_URL: http://qdrant:6333
      MNEMOSYNE_CHROMA_URL: http://chroma:8000
      MNEMOSYNE_PGVECTOR_DSN: postgresql://mnemosyne:mnemosyne@pgvector:5432/mnemosyne
      MNEMOSYNE_MILVUS_URL: http://milvus:19530
    depends_on:
      - qdrant
      - chroma
      - pgvector
      - milvus
    volumes:
      - ./tests/e2e-backends.sh:/src/tests/e2e-backends.sh:ro

  onnx-build:
    build:
      context: .
      target: builder
    command: ["cargo", "build", "--release", "-p", "mnemosyne-cli", "--features", "onnx"]

  bench:
    build:
      context: .
      target: builder
    command: ["/src/target/release/mnemosyne-bench", "synth", "--n", "200"]

  qdrant:
    image: qdrant/qdrant:v1.12.4

  chroma:
    image: chromadb/chroma:1.0.0

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mnemosyne
      POSTGRES_PASSWORD: mnemosyne
      POSTGRES_DB: mnemosyne

  milvus:
    image: milvusdb/milvus:v2.4.15
    command:
      - bash
      - -c
      - |
        mkdir -p /milvus/configs
        cat > /milvus/configs/embedEtcd.yaml <<'YAML'
        listen-client-urls: http://0.0.0.0:2379
        advertise-client-urls: http://0.0.0.0:2379
        quota-backend-bytes: 4294967296
        auto-compaction-mode: revision
        auto-compaction-retention: '1000'
        YAML
        exec milvus run standalone
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      ETCD_CONFIG_PATH: /milvus/configs/embedEtcd.yaml
      COMMON_STORAGETYPE: local

  # Build the documentation site (mdBook). Slow first run (compiles mdbook).
  #   docker compose run --rm site   → website/book/
  site:
    build:
      context: .
      target: builder
    working_dir: /src
    command: ["sh", "-c", "cargo install mdbook --locked --quiet && mdbook build website && echo SITE OK: website/book"]
    volumes:
      - ./website:/src/website

  cli:
    build:
      context: .
      target: runtime
    volumes:
      - mnemosyne-data:/data

  mcp:
    build:
      context: .
      target: runtime
    stdin_open: true
    command: ["serve-mcp"]
    volumes:
      - mnemosyne-data:/data

volumes:
  mnemosyne-data:
