# Mnemosyne test + run harness. Everything executes inside containers.
#
#   docker compose run --rm test          # unit + integration tests (cargo)
#   docker compose run --rm e2e           # end-to-end UI/UX suite against the real binary
#   docker compose run --rm backends-e2e  # remote index suite (starts qdrant/chroma/pgvector)
#   docker compose run --rm onnx-build    # compile check for the ONNX embedder feature
#   docker compose run --rm cli --help    # any CLI command
#   docker compose run --rm -i mcp        # MCP stdio server

services:
  test:
    build:
      context: .
      target: test
    command: ["cargo", "test", "--release"]

  # The CI lint gate (rustfmt + clippy, warnings-as-errors), runnable
  # locally so a push never fails on formatting. Use --build after code
  # changes, like the other suites:
  #   docker compose run --rm --build lint
  lint:
    build:
      context: .
      target: test
    entrypoint: ["sh", "-c"]
    command:
      - "rustup component add rustfmt clippy >/dev/null 2>&1 && cargo fmt --all --check && cargo clippy --all-targets -- -D warnings"

  e2e:
    build:
      context: .
      target: builder
    entrypoint: ["bash", "/src/tests/e2e.sh"]
    volumes:
      - ./tests/e2e.sh:/src/tests/e2e.sh:ro

  # Multi-tenant orchestrator suite: two engine instances + the
  # orchestrator control plane in one container.
  #   docker compose run --rm orchestrator-e2e
  orchestrator-e2e:
    build:
      context: .
      target: builder
    entrypoint: ["bash", "/src/tests/e2e-orchestrator.sh"]
    volumes:
      - ./tests/e2e-orchestrator.sh:/src/tests/e2e-orchestrator.sh:ro

  backends-e2e:
    build:
      context: .
      target: builder
    entrypoint: ["bash", "/src/tests/e2e-backends.sh"]
    environment:
      MNEMOSYNE_QDRANT_URL: http://qdrant:6333
      MNEMOSYNE_CHROMA_URL: http://chroma:8000
      MNEMOSYNE_PGVECTOR_DSN: postgresql://mnemosyne:mnemosyne@pgvector:5432/mnemosyne
      MNEMOSYNE_MILVUS_URL: http://milvus:19530
      MNEMOSYNE_WEAVIATE_URL: http://weaviate:8080
    depends_on:
      - qdrant
      - chroma
      - pgvector
      - milvus
      - weaviate
    volumes:
      - ./tests/e2e-backends.sh:/src/tests/e2e-backends.sh:ro

  onnx-build:
    build:
      context: .
      target: builder
    command: ["cargo", "build", "--release", "-p", "mnemosyne-cli", "--features", "onnx"]

  # Compile-check the optional ONNX Runtime (ort) backend, wired through the
  # CLI alongside tract (both features together — the strongest coexistence
  # check). Unlike the pure-Rust tract backend it links ORT's C++ library, so
  # it needs pkg-config/openssl/g++.
  ort-build:
    build:
      context: .
      target: builder
    entrypoint: ["bash", "-c"]
    command:
      - "apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev g++ >/dev/null 2>&1 && cargo build --release -p mnemosyne-cli --features onnx,ort"

  # Observability end-to-end suite. Builds the CLI with --features telemetry
  # (like onnx-build), then exercises the opt-in /metrics gating and that
  # traffic advances the Prometheus counters.
  #   docker compose run --rm e2e-telemetry
  e2e-telemetry:
    build:
      context: .
      target: builder
    entrypoint: ["bash", "-c"]
    command:
      - "cargo build --release -p mnemosyne-cli --features telemetry && bash /src/tests/e2e-telemetry.sh"
    volumes:
      - ./tests/e2e-telemetry.sh:/src/tests/e2e-telemetry.sh:ro

  bench:
    build:
      context: .
      target: builder
    command: ["/src/target/release/mnemosyne-bench", "synth", "--n", "200"]

  qdrant:
    image: qdrant/qdrant:v1.12.4

  chroma:
    image: chromadb/chroma:1.0.0

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mnemosyne
      POSTGRES_PASSWORD: mnemosyne
      POSTGRES_DB: mnemosyne

  milvus:
    image: milvusdb/milvus:v2.4.15
    command:
      - bash
      - -c
      - |
        mkdir -p /milvus/configs
        cat > /milvus/configs/embedEtcd.yaml <<'YAML'
        listen-client-urls: http://0.0.0.0:2379
        advertise-client-urls: http://0.0.0.0:2379
        quota-backend-bytes: 4294967296
        auto-compaction-mode: revision
        auto-compaction-retention: '1000'
        YAML
        exec milvus run standalone
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      ETCD_CONFIG_PATH: /milvus/configs/embedEtcd.yaml
      COMMON_STORAGETYPE: local

  weaviate:
    image: semitechnologies/weaviate:1.25.10
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1

  # Build the documentation site (mdBook). Slow first run (compiles mdbook).
  #   docker compose run --rm site   → website/book/
  site:
    build:
      context: .
      target: builder
    working_dir: /src
    # Same version the pages workflow pins — the two builds must not drift,
    # or the manual's sidebar markup/behavior differs between preview and live.
    command: ["sh", "-c", "cargo install mdbook --version 0.5.4 --locked --quiet && mdbook build website && echo SITE OK: website/book"]
    volumes:
      - ./website:/src/website
      # The book sources {{#include}} files from the repo root.
      - ./README.md:/src/README.md:ro
      - ./docs:/src/docs:ro

  cli:
    build:
      context: .
      target: runtime
    volumes:
      - mnemosyne-data:/data

  mcp:
    build:
      context: .
      target: runtime
    stdin_open: true
    command: ["serve-mcp"]
    volumes:
      - mnemosyne-data:/data

volumes:
  mnemosyne-data:
