name: ci
on:
  push:
    branches: [develop, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unit + integration tests (Docker)
        run: docker build --target test -t mnemosyne-test . && docker run --rm mnemosyne-test
      - name: E2E UI/UX suite (Docker)
        run: docker compose run --rm e2e
