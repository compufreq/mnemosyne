# On every version tag: build prebuilt binaries for the four desktop/server
# targets and attach them to the GitHub release, and publish the runtime
# container image to GHCR. Default cargo features only — offline, zero
# telemetry, exactly what `docker build` produces.
name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create/upload release assets
  packages: write # push ghcr.io images

jobs:
  binaries:
    name: Binaries (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
      - name: Build
        shell: bash
        run: |
          rustup target add "${{ matrix.target }}"
          cargo build --release --target "${{ matrix.target }}" \
            -p mnemosyne-cli -p mnemosyne-orchestrator
      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          NAME="mnemosyne-${TAG}-${{ matrix.target }}"
          mkdir -p "dist/${NAME}"
          BIN=target/${{ matrix.target }}/release
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "$BIN/mnemosyne.exe" "$BIN/mnemosyne-orchestrator.exe" "dist/${NAME}/"
          else
            cp "$BIN/mnemosyne" "$BIN/mnemosyne-orchestrator" "dist/${NAME}/"
          fi
          cp LICENSE NOTICE README.md SECURITY.md "dist/${NAME}/"
          cd dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a -tzip "${NAME}.zip" "${NAME}" >/dev/null
            ARCHIVE="${NAME}.zip"
          else
            tar -czf "${NAME}.tar.gz" "${NAME}"
            ARCHIVE="${NAME}.tar.gz"
          fi
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=dist/${ARCHIVE}" >> "$GITHUB_ENV"
      - name: Upload to the release
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # The release may not exist yet (it is normally created right
          # after the tag push) — create a placeholder if we get here first.
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "Release $TAG" || true
          gh release upload "$TAG" "$ARCHIVE" "${ARCHIVE}.sha256" --clobber

  # Each architecture builds natively (no QEMU emulation — a full Rust
  # build under emulation is unreasonably slow), then one job merges the
  # per-arch images into a single multi-arch manifest.
  docker:
    name: GHCR image (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/compufreq/mnemosyne:${{ github.ref_name }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  manifest:
    name: Multi-arch manifest
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Merge per-arch images
        run: |
          TAG="${GITHUB_REF_NAME}"
          IMG="ghcr.io/compufreq/mnemosyne"
          docker buildx imagetools create \
            -t "${IMG}:${TAG}" -t "${IMG}:latest" \
            "${IMG}:${TAG}-amd64" "${IMG}:${TAG}-arm64"
          docker buildx imagetools inspect "${IMG}:${TAG}"
